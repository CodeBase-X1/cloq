name: 💡 Feature Request
description: Suggest a new feature for Cloq
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the information below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Detection (new entity types)
        - Proxy (new providers)
        - CLI (new commands)
        - Configuration
        - Performance
        - Documentation
        - Other
    validations:
      required: true
